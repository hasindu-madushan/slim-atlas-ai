[http]
user_agent = "Mozilla/5.0 (compatible; slim-atlas/0.1)"
timeout_secs = 30
max_redirects = 10
max_body_bytes = 10485760  # 10MB

[tiers]
enabled = [1]                  # Phase 1: only tier 1
max_tier = 1
escalate_on_empty_dom = false
escalate_threshold_bytes = 50

[tier2]
deno_path = "/usr/local/bin/deno"
script_path = "./deno/render.ts"
pool_size = 2
idle_timeout_secs = 30
render_timeout_ms = 10000

[security]
allowed_hosts = []             # empty = no filter (dev)
block_third_party_cookies = true

[session]
ttl_minutes = 30
max_sessions = 50
persist = false

[server]
transport = "stdio"
sse_port = 3000
log_level = "info"
